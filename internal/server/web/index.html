<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>moxian-p2p</title>
<style>
  :root {
    --bg: #0f1220;
    --card: #181c33;
    --accent: #9fd0ff;
    --text: #e6e6e6;
    --muted: #8892a6;
    --green: #7dffa8;
    --red: #ff9f7d;
  }
  * { box-sizing: border-box; }
  body {
    background: var(--bg); color: var(--text);
    font-family: system-ui, -apple-system, "PingFang SC", Helvetica, Arial, sans-serif;
    margin: 0; padding: 20px;
  }
  .container { max-width: 480px; margin: 40px auto; }
  .card {
    background: var(--card); border-radius: 8px; padding: 24px; margin-bottom: 16px;
  }
  h1, h2 { color: var(--accent); margin: 0 0 16px; }
  h1 { font-size: 24px; }
  h2 { font-size: 18px; }
  label { display: block; font-size: 13px; color: var(--muted); margin: 12px 0 4px; }
  input, textarea {
    width: 100%; padding: 10px; font-size: 14px;
    background: var(--bg); border: 1px solid #2a2e50; border-radius: 4px;
    color: var(--text); font-family: inherit;
  }
  input:focus, textarea:focus { outline: 2px solid var(--accent); outline-offset: -2px; }
  button {
    background: var(--accent); color: var(--bg); border: 0; padding: 10px 20px;
    font-size: 14px; font-weight: 600; border-radius: 4px; cursor: pointer; width: 100%;
    margin-top: 16px;
  }
  button.secondary { background: transparent; color: var(--accent); border: 1px solid var(--accent); }
  button:disabled { opacity: 0.5; cursor: wait; }
  .muted { color: var(--muted); font-size: 12px; }
  .err { color: var(--red); font-size: 13px; padding: 8px 0; }
  .ok { color: var(--green); font-size: 13px; padding: 8px 0; }
  .tabs { display: flex; gap: 8px; margin-bottom: 16px; }
  .tab {
    flex: 1; padding: 10px; text-align: center; cursor: pointer;
    border: 1px solid #2a2e50; border-radius: 4px;
    color: var(--muted);
  }
  .tab.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }
  .hidden { display: none; }
  .code { font-family: monospace; background: var(--bg); padding: 4px 8px; border-radius: 3px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { text-align: left; padding: 8px; border-bottom: 1px solid #2a2e50; }
  th { color: var(--muted); font-weight: normal; }
</style>
</head>
<body>
<div class="container">
  <h1>🌐 moxian-p2p</h1>
  <div id="view-auth" class="card">
    <div class="tabs">
      <div class="tab active" data-tab="login">登录</div>
      <div class="tab" data-tab="register">注册</div>
    </div>

    <!-- 登录 -->
    <div id="pane-login">
      <label>邮箱</label>
      <input id="login-email" type="email" autocomplete="email"/>
      <label>密码</label>
      <input id="login-pass" type="password" autocomplete="current-password"/>
      <div id="login-msg" class="err"></div>
      <button id="login-btn">登录</button>
    </div>

    <!-- 注册 -->
    <div id="pane-register" class="hidden">
      <label>邮箱</label>
      <input id="reg-email" type="email" autocomplete="email"/>
      <label>用户名</label>
      <input id="reg-username" type="text" autocomplete="username"/>
      <label>密码（最少 6 位）</label>
      <input id="reg-pass" type="password" autocomplete="new-password"/>
      <label>邀请码 <span class="muted">（首位管理员免填）</span></label>
      <input id="reg-invite" type="text" style="text-transform:uppercase"/>
      <div id="reg-msg" class="err"></div>
      <button id="reg-btn">注册</button>
    </div>
  </div>

  <!-- 主面板 -->
  <div id="view-main" class="hidden">
    <div class="card">
      <div style="display:flex; justify-content:space-between; align-items:center">
        <div>
          <div id="me-info" class="muted"></div>
        </div>
        <button class="secondary" id="logout-btn" style="width:auto; margin:0;">登出</button>
      </div>
    </div>

    <!-- 我的节点 -->
    <div class="card">
      <h2>我的节点</h2>
      <div id="nodes-list"></div>
      <div style="margin-top:16px">
        <label>注册新节点（node_id 全局唯一）</label>
        <input id="new-node-id" placeholder="如 phone / laptop / nas"/>
        <button id="add-node-btn">注册节点</button>
      </div>
    </div>

    <!-- NAS 服务管理（含凭据 端到端加密 server 看不到密码）-->
    <div class="card">
      <h2>📦 NAS 服务凭据</h2>
      <div class="muted" style="margin-bottom:8px">
        服务定义 + 用户名/密码 加密存 vault APP 自动同步 端到端加密
      </div>
      <div id="vault-locked" class="hidden">
        <input type="password" id="vault-pwd" placeholder="主密码（解锁 vault）"/>
        <button id="vault-unlock-btn">解锁</button>
        <span id="vault-unlock-msg" class="muted"></span>
      </div>
      <div id="vault-content" class="hidden">
        <div id="services-list"></div>
        <div style="margin-top:16px; padding:12px; border:1px dashed var(--border); border-radius:6px;">
          <label>新建服务</label>
          <select id="svc-new-type">
            <option value="VIDEO">📺 影视</option>
            <option value="MUSIC">🎵 音乐</option>
            <option value="PHOTO">📷 相册</option>
            <option value="FILE">📁 文件</option>
            <option value="PASSWORD">🔐 密码</option>
            <option value="DOWNLOAD">⬇️ 下载</option>
            <option value="DASHBOARD">📊 面板</option>
            <option value="OTHER">🔗 其他</option>
          </select>
          <input id="svc-new-name" placeholder="名称 例 Jellyfin"/>
          <input id="svc-new-url" placeholder="URL 例 http://10.88.0.2:8096"/>
          <input id="svc-new-user" placeholder="用户名（可空 后续填）"/>
          <input id="svc-new-pass" type="password" placeholder="密码（可空 后续填）"/>
          <button id="svc-add-btn">添加</button>
          <div id="svc-add-msg" class="muted"></div>
        </div>
      </div>
    </div>

    <!-- 管理员：邀请码 -->
    <div id="admin-card" class="card hidden">
      <h2>🔑 邀请码（管理员）</h2>
      <div id="invites-list"></div>
      <button id="new-invite-btn">生成新邀请码（24小时有效）</button>
    </div>

    <!-- 管理员：用户 -->
    <div id="users-card" class="card hidden">
      <h2>👥 所有用户（管理员）</h2>
      <div id="users-list"></div>
    </div>

    <!-- 管理员：APK release -->
    <div id="releases-card" class="card hidden">
      <h2>📦 APK 版本（管理员）</h2>
      <div class="muted" style="margin-bottom:12px">APP 端 自动检查更新走此服务器 不再依赖 GitHub</div>
      <div id="releases-list"></div>
      <div style="margin-top:16px; padding:12px; border:1px dashed var(--border); border-radius:6px;">
        <label>上传新版 APK</label>
        <input id="rel-tag" placeholder="版本 tag 例 v2.1.1"/>
        <input id="rel-notes" placeholder="说明（可选）"/>
        <input id="rel-file" type="file" accept=".apk"/>
        <button id="upload-rel-btn">上传 + 设为最新</button>
        <div id="upload-rel-msg" class="muted"></div>
      </div>
    </div>
  </div>
</div>

<script src="/web/app.js"></script>
</body>
</html>
