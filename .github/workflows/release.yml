name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: '要发布的 tag（需已存在 例 v0.6.0）'
        required: true

permissions:
  contents: write
  packages: write   # 推 Docker 镜像到 ghcr.io 需要

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Build Go binaries (cross-compile)
        env:
          CGO_ENABLED: 0
        run: |
          set -e
          mkdir -p bin
          LD_FLAGS="-s -w"
          GOOS=linux   GOARCH=amd64 go build -trimpath -ldflags "$LD_FLAGS" -o bin/moxian-server-linux-amd64 ./cmd/server
          GOOS=linux   GOARCH=amd64 go build -trimpath -ldflags "$LD_FLAGS" -o bin/moxian-client-linux-amd64 ./cmd/client
          GOOS=linux   GOARCH=arm64 go build -trimpath -ldflags "$LD_FLAGS" -o bin/moxian-server-linux-arm64 ./cmd/server
          GOOS=linux   GOARCH=arm64 go build -trimpath -ldflags "$LD_FLAGS" -o bin/moxian-client-linux-arm64 ./cmd/client
          GOOS=windows GOARCH=amd64 go build -trimpath -ldflags "$LD_FLAGS" -o bin/moxian-server.exe           ./cmd/server
          GOOS=windows GOARCH=amd64 go build -trimpath -ldflags "$LD_FLAGS" -o bin/moxian-client.exe           ./cmd/client
          # Windows 托盘 GUI 隐藏控制台 右键 exe 以管理员身份运行
          GOOS=windows GOARCH=amd64 go build -trimpath -ldflags "$LD_FLAGS -H=windowsgui" -o bin/moxian-gui.exe ./cmd/moxian-gui
          GOOS=darwin  GOARCH=amd64 go build -trimpath -ldflags "$LD_FLAGS" -o bin/moxian-client-darwin-amd64  ./cmd/client
          ls -la bin/

      - name: Download wintun.dll
        run: |
          curl -fsSL -o /tmp/wintun.zip https://www.wintun.net/builds/wintun-0.14.1.zip
          unzip -j /tmp/wintun.zip wintun/bin/amd64/wintun.dll -d bin/

      # ---- Docker 镜像构建放这里：使用干净的 go.mod/go.sum ----
      # 注意：必须在 gomobile 步骤之前 否则 go get 会污染 go.mod
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract tag version
        id: ver
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=${TAG#v}" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        continue-on-error: true    # GHCR 瞬时故障不影响 APK / 二进制发版
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/mo-xian/moxian-p2p:latest
            ghcr.io/mo-xian/moxian-p2p:${{ steps.ver.outputs.tag }}
            ghcr.io/mo-xian/moxian-p2p:${{ steps.ver.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          sdkmanager "ndk;26.1.10909125" "platforms;android-34" "build-tools;34.0.0"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/26.1.10909125" >> $GITHUB_ENV

      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: gomobile init
        run: |
          gomobile init
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}

      - name: Build moxian.aar
        run: |
          mkdir -p android/app/libs
          # gomobile 生成的桥接代码依赖 golang.org/x/mobile/bind 运行时
          # 动态 go get（不改项目 go.mod 因为项目代码不直接 import）
          go get golang.org/x/mobile/bind
          gomobile bind \
            -target=android/arm64 \
            -androidapi 24 \
            -javapkg=com.cp12064.moxianp2p \
            -o android/app/libs/moxian.aar \
            ./mobile
          ls -la android/app/libs/

      - name: Build Android APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace
          cp app/build/outputs/apk/debug/app-debug.apk ../bin/moxian-p2p-debug.apk
          ls -la ../bin/moxian-p2p-debug.apk

      - name: Checksums
        run: |
          cd bin
          sha256sum moxian-* wintun.dll > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: ${{ github.event.inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: |
            bin/moxian-server-linux-amd64
            bin/moxian-server-linux-arm64
            bin/moxian-server.exe
            bin/moxian-client-linux-amd64
            bin/moxian-client-linux-arm64
            bin/moxian-client-darwin-amd64
            bin/moxian-client.exe
            bin/moxian-gui.exe
            bin/moxian-p2p-debug.apk
            bin/wintun.dll
            bin/SHA256SUMS.txt

      # ---- 自动推 APK 到 VPS（无人值守）----
      # 需要在 repo settings → Secrets and variables → Actions 配两个 secret：
      #   MOXIAN_RELEASE_URL    例 https://your-vps.com:7788
      #   MOXIAN_RELEASE_TOKEN  与服务端 -release-ci-token 一致
      # 没配 secret 此步会跳过（exit 0）不会让 job 失败
      - name: Upload APK to VPS
        env:
          MOXIAN_RELEASE_URL: ${{ secrets.MOXIAN_RELEASE_URL }}
          MOXIAN_RELEASE_TOKEN: ${{ secrets.MOXIAN_RELEASE_TOKEN }}
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          if [ -z "$MOXIAN_RELEASE_URL" ] || [ -z "$MOXIAN_RELEASE_TOKEN" ]; then
            echo "::notice::secrets 未配置（MOXIAN_RELEASE_URL/MOXIAN_RELEASE_TOKEN）跳过 VPS 推送"
            exit 0
          fi
          # 长度校验（不暴露内容 防 secret 含奇怪字符比如尾部换行）
          echo "[upload] tag=$TAG URL_LEN=${#MOXIAN_RELEASE_URL} TOKEN_LEN=${#MOXIAN_RELEASE_TOKEN}"
          # 1. 先 ping 一次健康检查 看连通性
          echo "[probe] /healthz"
          curl -ksv -o /dev/null --max-time 15 "$MOXIAN_RELEASE_URL/healthz" 2>&1 | tail -25 || true
          echo "[probe] done"
          # 2. 实际推送（-k 容忍自签证书 -v 走 stderr 不污染 HTTP_CODE 抓取）
          HTTP_CODE=$(curl -sk -o /tmp/upload.json -w "%{http_code}" --max-time 300 \
            -H "X-Release-Token: $MOXIAN_RELEASE_TOKEN" \
            -F "tag=$TAG" \
            -F "notes=自动从 GitHub Actions 推送" \
            -F "file=@bin/moxian-p2p-debug.apk" \
            "$MOXIAN_RELEASE_URL/api/release/ci-upload" || echo "000")
          echo "[upload] HTTP $HTTP_CODE"
          cat /tmp/upload.json 2>/dev/null || true
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::warning::APK 推送 VPS 失败 HTTP $HTTP_CODE — GitHub release 仍正常"
            exit 0
          fi
          echo "✅ APK 已推送到 VPS 并设为 latest"
