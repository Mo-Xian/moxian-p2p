# === moxian-p2p 客户端配置（通用模板）===
# 适用于 Linux / Windows / macOS 任意客户端节点（VPS 只跑 server 不要这个文件）
# 启动: moxian-client -config client.yaml

# ---- 必填 ----
node_id: my-node            # 节点唯一 ID（英文/数字）
server: ws://139.224.1.83:7788/ws     # VPS server 地址（wss://... 如启用 TLS）
server_udp: 139.224.1.83:7789         # VPS UDP STUN/中继端口
token: your-secret-token-here         # 与 server.yaml 里 token 一致
pass: shared-secret                   # 会话对称加密 所有 client 必须一致

# ---- 元数据 展示 + ACL 用 ----
tags:
  - role=generic
description: 节点描述（控制台展示用）

# ---- 虚拟局域网 TUN ----
# 分配 vIP 启用后任意节点间可直接访问 (ping/SSH/HTTP/...)
# 前置条件: Linux/macOS root；Windows 需 wintun.dll 同目录 + 管理员
# 每个节点必须不同
virtual_ip: 10.88.0.2
tun_subnet: "24"

# ---- 自动组网 ----
# 开启后节点上线后自动与其他节点建隧道 首次访问 0 延迟
mesh: true

# ---- UPnP（提高打洞成功率，家用 NAT 有效）----
upnp: false

# ---- 主动侧端口转发（不开 TUN 也能用）----
# forwards:
#   - local: 127.0.0.1:2222
#     peer: home-nas
#     target: 127.0.0.1:22
#   - local: 0.0.0.0:8080
#     peer: home-nas
#     target: 127.0.0.1:80

# ---- 被动侧白名单（限制对端 dial 的目标）----
# allow_targets:
#   - 127.0.0.1:22
#   - 127.0.0.1:3389
allow_targets: []

# ---- ACL（限制谁能连自己 支持 node_id / "tag=value" / "*"）----
# allow_peers:
#   - home-laptop
#   - role=workstation
allow_peers: []

# ---- 统计 / 限速 ----
stats_http: ""               # 127.0.0.1:7800 暴露 /stats /metrics
stats_log: 0s                # 定期打印流量 例 30s
rate_limit: ""               # 客户端总出站限速 例 "5MB"

# ---- 日志 ----
verbose: false               # true 打印 TUN/tunnel 追踪 排障用
