# moxian-nas-stack 统一应用编排
#
# 使用：
#   cp .env.example .env
#   # 改 .env 里的密码/时区/数据路径
#   docker compose up -d
#
# 迁移：
#   rsync -avP OLDNAS:${DATA_ROOT}/ ${DATA_ROOT}/
#   docker compose up -d     # 数据卷路径一致 应用自动识别历史数据

services:
  # ==========================================================================
  # Immich — AI 相册（人脸识别 / 物体识别 / 地理索引）
  # Web: http://<NAS-IP>:${IMMICH_PORT}
  # ==========================================================================
  immich-server:
    image: ghcr.io/immich-app/immich-server:${IMMICH_VERSION}
    container_name: immich-server
    restart: unless-stopped
    ports:
      - "${IMMICH_PORT}:2283"
    environment:
      TZ: ${TZ}
      UPLOAD_LOCATION: /usr/src/app/upload
      DB_HOSTNAME: immich-db
      DB_USERNAME: postgres
      DB_PASSWORD: ${IMMICH_DB_PASSWORD}
      DB_DATABASE_NAME: immich
      REDIS_HOSTNAME: immich-redis
    volumes:
      - ${DATA_ROOT}/photos:/usr/src/app/upload
      - /etc/localtime:/etc/localtime:ro
    depends_on:
      - immich-db
      - immich-redis
      - immich-ml
    networks: [nas]

  # 默认 CPU 模式。真机部署开 OpenVINO / CUDA 参见 ../self-hosted-nas.md#521-选择推理加速方式
  # OpenVINO (Intel iGPU) 改镜像为 :${IMMICH_VERSION}-openvino + 加 devices /dev/dri + group_add render GID
  # CUDA   (NVIDIA dGPU) 改镜像为 :${IMMICH_VERSION}-cuda + 加 deploy.resources.reservations.devices nvidia
  # Windows WSL2 / Hyper-V 测试保持默认 CPU 模式 最稳
  immich-ml:
    image: ghcr.io/immich-app/immich-machine-learning:${IMMICH_VERSION}
    container_name: immich-ml
    restart: unless-stopped
    volumes:
      - ${DATA_ROOT}/appdata/immich-ml:/cache
    networks: [nas]

  immich-redis:
    image: docker.io/redis:6.2-alpine
    container_name: immich-redis
    restart: unless-stopped
    networks: [nas]

  immich-db:
    image: docker.io/tensorchord/pgvecto-rs:pg14-v0.2.0
    container_name: immich-db
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${IMMICH_DB_PASSWORD}
      POSTGRES_USER: postgres
      POSTGRES_DB: immich
    volumes:
      - ${DATA_ROOT}/appdata/immich-db:/var/lib/postgresql/data
    networks: [nas]

  # ==========================================================================
  # Jellyfin — 家庭影视库（刮削 + 硬件转码）
  # Web: http://<NAS-IP>:${JELLYFIN_PORT}
  # ==========================================================================
  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: jellyfin
    restart: unless-stopped
    user: "${PUID}:${PGID}"
    ports:
      - "${JELLYFIN_PORT}:8096"
    # 如有 Intel/AMD iGPU 取消下面 devices 注释开启硬解
    # devices:
    #   - /dev/dri:/dev/dri
    environment:
      TZ: ${TZ}
    volumes:
      - ${DATA_ROOT}/appdata/jellyfin/config:/config
      - ${DATA_ROOT}/appdata/jellyfin/cache:/cache
      - ${DATA_ROOT}/media:/media:ro
    networks: [nas]

  # ==========================================================================
  # Syncthing — 多端同步（替代 OneDrive/Dropbox）
  # Web: http://<NAS-IP>:${SYNCTHING_UI_PORT}
  # ==========================================================================
  syncthing:
    image: syncthing/syncthing:latest
    container_name: syncthing
    restart: unless-stopped
    hostname: nas-syncthing
    user: "${PUID}:${PGID}"
    environment:
      TZ: ${TZ}
    ports:
      - "${SYNCTHING_UI_PORT}:8384"
      - "22000:22000/tcp"
      - "22000:22000/udp"
      - "21027:21027/udp"
    volumes:
      - ${DATA_ROOT}/appdata/syncthing:/var/syncthing/config
      - ${DATA_ROOT}/docs:/var/syncthing/docs
    networks: [nas]

  # ==========================================================================
  # Vaultwarden — 自托管密码管理（Bitwarden 服务端 Rust 实现）
  # Web: http://<NAS-IP>:${VAULTWARDEN_PORT}
  # ==========================================================================
  vaultwarden:
    image: vaultwarden/server:latest
    container_name: vaultwarden
    restart: unless-stopped
    environment:
      TZ: ${TZ}
      ADMIN_TOKEN: ${VAULTWARDEN_ADMIN_TOKEN}
      SIGNUPS_ALLOWED: ${VAULTWARDEN_SIGNUPS_ALLOWED}
      DOMAIN: http://${HOST_IP}:${VAULTWARDEN_PORT}
    ports:
      - "${VAULTWARDEN_PORT}:80"
    volumes:
      - ${DATA_ROOT}/appdata/vaultwarden:/data
    networks: [nas]

  # ==========================================================================
  # qBittorrent — BT/PT 下载
  # Web: http://<NAS-IP>:${QBIT_UI_PORT}
  # ==========================================================================
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    restart: unless-stopped
    environment:
      TZ: ${TZ}
      PUID: ${PUID}
      PGID: ${PGID}
      WEBUI_PORT: ${QBIT_UI_PORT}
    ports:
      - "${QBIT_UI_PORT}:${QBIT_UI_PORT}"
      - "6881:6881"
      - "6881:6881/udp"
    volumes:
      - ${DATA_ROOT}/appdata/qbittorrent:/config
      - ${DATA_ROOT}/downloads:/downloads
      - ${DATA_ROOT}/media:/media  # 完成后可自动移动到影视库
    networks: [nas]

  # ==========================================================================
  # moxian-p2p — 远程访问（替代 Tailscale / 飞牛会员中继）
  # TUN 模式需要 NET_ADMIN 和 /dev/net/tun
  # ==========================================================================
  moxian-client:
    image: ghcr.io/mo-xian/moxian-p2p:latest
    container_name: moxian-client
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    network_mode: host   # TUN 要求 host 网络栈
    volumes:
      - ./configs/moxian/client.yaml:/etc/moxian/client.yaml:ro
    command: ["-config", "/etc/moxian/client.yaml"]

networks:
  nas:
    name: nas
    driver: bridge
