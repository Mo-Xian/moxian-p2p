# moxian-p2p NAS 端 responder 容器（overlay）
#
# 作用：让外部对端（手机/笔记本）通过 mesh 连到你的 NAS 访问 Docker 网络里的服务
#
# 设计：
#   - 纯 responder 模式 不开 TUN 不要 host 网络 不要 NET_ADMIN
#     → Windows Docker Desktop / macOS 也能跑
#   - 镜像本地 build（Dockerfile 在仓库根）
#     → 不依赖 ghcr.io 国内网络也能起
#   - 加入 nas 网络 和 jellyfin / immich 等服务同一 Docker DNS 命名空间
#     → 对端转发规则目标写 jellyfin:8096 / immich-server:2283 即可
#
# 启用（两种）：
#   一次性命令：
#     docker compose -f docker-compose.yml -f docker-compose.moxian.yml up -d
#   或把两个文件合并（COMPOSE_FILE 环境变量）：
#     set COMPOSE_FILE=docker-compose.yml;docker-compose.moxian.yml
#     docker compose up -d
#
# 首次需要构建镜像 约 1 分钟 之后启动秒级

services:
  moxian-client:
    build:
      context: ../..            # 指向仓库根 用那里的 Dockerfile
      dockerfile: Dockerfile
    image: moxian-p2p:nas-stack  # 本地 tag 避免跑 docker compose pull 时尝试 ghcr 拉取
    pull_policy: never           # 永不从远端拉取 只用本地 build 好的
    container_name: moxian-client
    restart: unless-stopped
    networks: [nas]              # 和 jellyfin/immich 等服务同一网络 DNS 可互通
    volumes:
      - ./configs/moxian/client.yaml:/etc/moxian/client.yaml:ro
