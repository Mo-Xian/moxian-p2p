# moxian-p2p NAS 端容器 TUN + mesh 模式（overlay）
#
# ⚠️ 仅 Linux 真机！
#   - Windows / macOS Docker Desktop 下 TUN + host 网络不稳 请勿用本 overlay
#   - Windows 改用原生 moxian-gui.exe（要管理员）详见 README-windows.md 第五节
#
# 特性：
#   - 开 TUN 分配 vIP 对端（手机/笔记本）直接用 http://<vIP>:端口 访问 NAS 服务
#   - 和 Tailscale 一样的透明 mesh 体验
#   - 镜像本地 build（仓库根 Dockerfile）不依赖 ghcr.io
#
# 启用：
#   docker compose -f docker-compose.yml -f docker-compose.moxian.yml up -d
#
# 首次 build 约 1 分钟 之后秒级启动

services:
  moxian-client:
    build:
      context: ../..
      dockerfile: Dockerfile
    image: moxian-p2p:nas-stack   # 本地 tag 避免 docker compose pull 尝试远端拉取
    pull_policy: never            # 永不 fetch 只用本地 build 结果
    container_name: moxian-client
    restart: unless-stopped
    cap_add:
      - NET_ADMIN                 # 操作 TUN 设备需要
    devices:
      - /dev/net/tun:/dev/net/tun # 把宿主 TUN 设备透传给容器
    network_mode: host            # TUN mesh 正常工作需要 host 网络栈 仅 Linux 真机稳定
    volumes:
      - ./configs/moxian/client.yaml:/etc/moxian/client.yaml:ro
